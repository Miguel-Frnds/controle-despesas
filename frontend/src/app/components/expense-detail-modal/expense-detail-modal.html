<dialog [open]="isOpen">
    <div class="modal-container">
        <div class="box-modal">
            <div class="modal-header">
                <h2>Despesa</h2>
                <button class="close-btn" (click)="fechar()">
                    <svg class="icon close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="modal-body" *ngIf="expense">

                <div class="form-group">
                    <label class="form-label" for="">Título da Despesa</label>
                    <input disabled class="form-input" type="text" [(ngModel)]="expense.title" placeholder="Ex: Mercado">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="">Data</label>
                    <input disabled class="form-input" [(ngModel)]="expense.expenseDate" type="date">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="">Categoria</label>
                        <input disabled class="form-input" type="text" [ngModel]="categoryLabels[expense.category] || expense.category">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="">Membro Responsável</label>
                        <input disabled class="form-input" type="text" [ngModel]="expense.memberName">
                    </div>
                </div>

                <div class="expense-items">

                    <div class="expense-items-header">
                        
                        <label class="form-label" for="">Itens da Despesa</label>
                    </div>

                    <div class="expense-item" *ngFor="let item of expense.items; let i = index">

                        <div class="form-group">
                            <label class="form-label" for="">Nome do Item</label>
                                <div class="item-name-input">
                                    <input disabled class="form-input" type="text" [(ngModel)]="item.name" placeholder="Ex: Arroz 5kg">
                                </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="">Quantidade</label>
                                <input disabled class="form-input" type="number" min="1" oninput="validity.valid||(value='');" [(ngModel)]="item.quantity">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="">Preço Unitário (R$)</label>
                                <input disabled class="form-input" type="number" min="0.00" step="0.01" oninput="validity.valid||(value='');" [(ngModel)]="item.unitPrice">
                            </div>
                        </div>

                    </div>
                </div>

                <div class="expense-total">
                    <span>Total da Despesa:</span>
                    <span class="expense-total-value">{{ totalExpense | currency: 'BRL':'symbol':'1.2-2' }}</span>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" (click)="fechar()">Sair</button>
            </div>
        </div> 
    </div>
</dialog>
