<dialog [open]="isOpen">
    <div class="modal-container">
        <div class="box-modal">
            <header class="header-content">
                <div class="modal-header">
                    <h2>{{ mode === 'create' ? 'Novo Membro' : 'Alterar Membro'}}</h2>
                    <button class="close-btn" (click)="close()">
                        <svg class="icon close-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"></path>
                            <path d="m6 6 12 12"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <main class="main-content">
                <div class="main-box">
                    <label class="box-text" for="">Nome do Membro</label>
                    <input class="box-input" type="text" [(ngModel)]="name" placeholder="Ex: Matheus">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" (click)="close()">Cancelar</button>
                    <button class="btn btn-primary" (click)="saveMember()">Salvar Membro</button>
                </div>
            </main>
        </div>
    </div>
</dialog>
